<script>
const NL={meta:{icon:"🗞️",edition:"Vol.24",cadence:"주간",date:"2026년 6월 23일 (화)",curator:"Claude (Cowork)",title:["주간 AI 뉴스레터 — ","TPM Edition"],lead:"TPM 관점에서 꼭 알아야 할 한 주의 AI 소식. 함께 일하는 엔지니어팀의 도구 변화, 프로그램 관리 자동화, 그리고 리더십 보고에 쓸 수 있는 빅테크 전략 동향까지.",greeting:"안녕하세요! 이번 주는 AI 모델 수출규제라는 전례 없는 사태부터 엔지니어들이 실제로 쓰는 도구의 보안 이슈, TPM 업무에 바로 쓸 수 있는 자동화 기능까지 챙겨봤어요. <b>탭마다 'TPM 관점'</b>으로 실무에 어떻게 연결되는지 담았습니다."},topics:[{id:"top",label:"이 주의 핵심",icon:"⚡",tint:"red",desc:"이번 주 AI 업계에서 가장 파급력 있는 한 가지.",criteria:"<b>프로그램 의사결정과 팀 운영에 직접 영향을 주는</b> 소식을 최우선으로 선정했습니다.",highlight:{kicker:"이 주의 빅스토리",title:"AI 모델이 수출 규제 대상이 됐다 — Fable 5 전면 차단 사태",summary:"앤트로픽의 Fable 5·Mythos 5가 미국 상무부 수출규제로 6월 12일부터 전 세계에서 오프라인 상태입니다. 같은 날 NAVER·삼성SDS·LG CNS·넥슨 등 한국 대기업들이 Claude 대규모 도입을 발표했습니다.",detail:"<p><b>TPM 관점에서 왜 중요한가</b>: AI 도구가 이제 '언제든 끊길 수 있는 인프라'가 됐습니다. 팀이 특정 AI 서비스에 의존하는 워크플로가 있다면 단일 공급자 리스크를 점검해야 합니다.</p><p><b>한국 기업 도입 가속</b>: NAVER 전 엔지니어링 조직에 Claude Code 배포, 삼성SDS가 삼성전자 전체에 Claude 확대, LG CNS가 LG그룹 전체 도입을 발표했습니다.</p>",source:"Build Fast with AI",url:"https://www.buildfastwithai.com/blogs/ai-news-today-june-22-2026",published:"2026-06-22",foryou:"팀이 의존하는 AI 도구 목록을 만들고, 각각의 대체 옵션을 미리 파악해두세요. 리스크 레지스터에 'AI 서비스 가용성' 항목을 추가할 타이밍입니다."},articles:[{tag:"인사 이동",source:"TechCrunch",url:"https://techcrunch.com/2026/06/18/openai-is-bringing-on-some-big-guns-in-the-lead-up-to-its-ipo/",published:"2026-06-18",title:"Transformer 공동저자 Noam Shazeer, OpenAI 아키텍처 연구 총괄 합류",summary:"'Attention Is All You Need' 공동저자 Noam Shazeer가 Google DeepMind를 떠나 OpenAI에 합류했습니다. 재영입 22개월 만입니다.",detail:"<p>6~12개월 후 출시될 GPT 신모델의 성능과 특성이 그의 결정에 달려 있습니다.</p><p><b>TPM 관점</b>: OpenAI 의존도가 높은 프로그램이 있다면 하반기 모델 변화에 따른 호환성 리스크를 검토해두세요.</p>",foryou:"엔지니어 팀이 GPT 기반 도구를 쓴다면, 하반기 모델 변경이 기존 프롬프트나 API 응답에 영향을 줄 수 있습니다. 변경 대응 계획을 미리 백로그에 넣어두세요."},{tag:"시장 동향",source:"Sensor Tower",url:"https://www.buildfastwithai.com/blogs/ai-news-today-june-22-2026",published:"2026-06-22",title:"ChatGPT 점유율 처음으로 50% 이하 — Claude 유료 전환율 업계 1위",summary:"ChatGPT 글로벌 점유율이 46.4%로 하락, Gemini 27.7%, Claude 10.3%로 시장이 재편되고 있습니다. Claude의 유료 전환율은 13%로 업계 최고입니다.",detail:"<p><b>TPM 관점</b>: 팀 내 AI 도구 도입 정책을 논의할 때, 단일 도구 표준화보다 '용도별 최적 도구'를 허용하는 방향이 실질적인 생산성에 더 유리할 수 있습니다.</p>",foryou:"팀에서 어떤 AI 도구를 쓰는지, 왜 그걸 선택했는지 간단히 파악해보세요. 표준화 vs 다양화 방향 결정에 데이터가 됩니다."}]},{id:"devtools",label:"개발 AI 동향",icon:"🛠️",tint:"purple",desc:"함께 일하는 엔지니어팀이 쓰는 AI 도구 변화 — 알아야 대화가 됩니다.",criteria:"엔지니어 팀의 <b>실제 워크플로에 영향을 주는</b> AI 코딩 도구, 보안 이슈, 모델 변화를 중심으로 골랐습니다.",highlight:{kicker:"이 주의 개발 경보",title:"Agentjacking — AI 코딩 에이전트를 노린 신종 공격, 2,388개 조직 피해",summary:"Sentry 에러 리포트에 악성 지시를 심어 Claude Code·Cursor 같은 AI 코딩 에이전트를 오염시키는 'Agentjacking' 공격이 확산됐습니다. 공격 성공률 85%, 2,388개 조직 피해. 아직 범용 패치가 없습니다.",detail:"<p><b>공격 원리</b>: 에러 추적 도구에 악성 마크다운 지시를 심으면, AI 코딩 에이전트가 이를 정상 디버깅 가이드로 오해하고 악성 명령을 실행합니다.</p><p><b>임시 대응</b>: 에러 리포트를 AI에 넣기 전 사람이 먼저 검토하는 단계를 추가하세요.</p>",source:"Build Fast with AI",url:"https://www.buildfastwithai.com/blogs/ai-news-today-june-22-2026",published:"2026-06-22",foryou:"엔지니어 팀에 'Sentry 등 에러 리포트를 AI 에이전트에 직접 넣지 말 것' 공지를 빠르게 돌려주세요. AI 코딩 도구 사용 가이드라인을 만들기 좋은 계기입니다."},articles:[{tag:"오픈소스",source:"VentureBeat",url:"https://venturebeat.com/technology/z-ais-open-weights-glm-5-2-beats-gpt-5-5-on-multiple-long-horizon-coding-benchmarks-for-1-6th-the-cost",published:"2026-06-13",title:"GLM-5.2 — GPT-5.5보다 코딩 성능 높고 비용은 1/6",summary:"Zhipu AI의 오픈소스 모델 GLM-5.2가 SWE-bench Pro에서 GPT-5.5를 앞섰습니다(62.1 vs 58.6점). MIT 라이선스, 비용은 1/6 수준입니다.",detail:"<p>Fable 5 차단 이후 '오픈소스 모델은 정부도 막을 수 없다'는 장점이 실제로 증명됐습니다.</p><p>Z.ai API($4.40/백만 토큰)가 현실적인 접근 방법입니다.</p>",foryou:"AI 코딩 비용을 걱정한다면, GLM-5.2 API를 특정 작업에 파일럿 테스트해볼 수 있습니다."},{tag:"인수합병",source:"The New Stack",url:"https://thenewstack.io/openai-acquires-astral-to-bring-open-source-python-developer-tools-to-codex/",published:"2026-06-20",title:"OpenAI, Python 핵심 도구 Astral 인수 — uv·ruff가 Codex에 통합",summary:"OpenAI가 Python 생태계 표준 도구인 uv·ruff를 만든 Astral을 인수해 Codex에 통합합니다. 현재 팀에서 이 도구를 쓴다면 라이선스 변경 여부를 지켜봐야 합니다.",detail:"<p>uv와 ruff는 대부분의 Python 프로젝트가 채택한 사실상의 표준 도구입니다. OpenAI 인수로 거버넌스가 바뀔 경우 팀 빌드 파이프라인에 영향이 생길 수 있습니다.</p>",foryou:"Python 프로젝트가 있다면 uv·ruff 사용 여부를 확인하고, 라이선스 발표를 지켜보는 태스크를 스프린트 백로그에 넣어두세요."}]},{id:"tpm",label:"TPM 업무 자동화",icon:"📋",tint:"blue",desc:"로드맵·스프린트·문서화·커뮤니케이션에 바로 쓸 수 있는 AI 기능.",criteria:"<b>TPM 실무에 직접 적용 가능한</b> AI 도구 업데이트를 중심으로 골랐습니다.",highlight:{kicker:"TPM 필수 업데이트",title:"OpenAI Record & Replay — 워크플로 한 번 시연하면 Codex가 반복 자동화",summary:"ChatGPT Business에서 업무 흐름을 한 번 시연하면 Codex가 이를 재사용 가능한 자동화 스킬로 저장합니다. 반복적인 상태 업데이트, 리포트 취합, 문서 정리에 바로 적용할 수 있습니다.",detail:"<p><b>TPM에게 가장 유용한 시나리오</b>:</p><p>① 스프린트 리뷰 문서 취합 자동화 — 여러 팀 업데이트를 형식에 맞게 정리</p><p>② 주간 리포트 초안 작성 — 지라/노션 데이터로 리더십 보고 포맷 정리</p><p>③ 의존성 추적 업데이트 — 마일스톤별 상태 정기 갱신</p><p><b>현재 제약</b>: EU·영국·스위스 제외, ChatGPT Business 플랜에서 사용 가능합니다.</p>",source:"Build Fast with AI",url:"https://www.buildfastwithai.com/blogs/ai-news-today-june-22-2026",published:"2026-06-22",foryou:"가장 자주 반복하는 문서 취합 업무 하나를 골라 Record & Replay로 자동화해보세요."},articles:[{tag:"도구 업데이트",source:"The Register",url:"https://www.theregister.com/2026/03/26/linear_agent/",published:"2026-03-26",title:"Linear Agent — 백로그·피드백·코드 전체 맥락을 아는 AI가 이슈를 만든다",summary:"Linear가 로드맵·백로그·고객 피드백·코드 저장소 전체 맥락에 접근하는 AI 에이전트를 출시했습니다. 자연어로 지시하면 논의 내용을 이슈로 만들고 스프린트를 구성합니다.",detail:"<p><b>바로 쓸 수 있는 방법</b>: 스프린트 계획 회의 후 'Slack 스레드의 논의를 이슈로 만들고 우선순위와 담당자를 제안해줘'처럼 지시하면 됩니다.</p><p><b>주의</b>: 에이전트가 만든 이슈·배정은 반드시 사람이 확인 후 확정해야 합니다.</p>",foryou:"다음 스프린트 계획 전, 백로그 정리 작업 일부를 Linear Agent에 맡겨보세요. 이슈 초안 생성까지만 시키고 검토는 직접 하는 방식으로 시작하면 안전합니다."},{tag:"도구 업데이트",source:"TechCrunch",url:"https://techcrunch.com/2026/05/13/notion-just-turned-its-workspace-into-a-hub-for-ai-agents/",published:"2026-05-13",title:"Notion, 외부 데이터 동기화 + AI 에이전트 오케스트레이션 공개",summary:"Notion이 Salesforce·Zendesk·Jira 등 외부 소스를 데이터베이스로 동기화하고, 커스텀 에이전트로 반복 작업을 자동화하는 플랫폼을 공개했습니다.",detail:"<p><b>TPM 활용 시나리오</b>: 여러 팀의 Jira 데이터를 Notion으로 동기화 → 에이전트가 매주 마일스톤별 진행 상황을 자동 취합 → 리더십 보고 문서 초안 생성.</p>",foryou:"여러 팀의 상태를 매주 수동으로 취합하고 있다면, Notion 에이전트로 초안 생성까지 자동화해보세요."}]},{id:"strategy",label:"빅테크 & 전략 동향",icon:"🌐",tint:"orange",desc:"리더십 보고와 프로그램 의사결정에 필요한 산업 맥락.",criteria:"<b>조직의 AI 전략과 프로그램 방향성에 영향을 주는</b> 빅픽처 동향을 담았습니다.",highlight:{kicker:"전략 이슈",title:"중국 5년간 $2,950억 AI 인프라 투자 — AI가 지정학 변수가 됐다",summary:"중국이 5년간 약 400조 원 규모의 국가 AI 인프라 투자 계획을 발표했습니다. Fable 5 수출규제 직후 나온 이 선언은, AI 공급망이 지정학 리스크와 직결된다는 것을 보여줍니다.",detail:"<p><b>TPM이 알아야 하는 이유</b>: AI 도구 선택이 단순한 기술 결정이 아니라 공급망 안정성, 규제 리스크, 데이터 주권과 연결되는 의사결정이 됐습니다.</p><p>Fable 5처럼 하루아침에 서비스가 중단될 수 있습니다. 핵심 워크플로에 단일 AI 서비스 의존도가 높다면 대체 옵션을 마련해야 합니다.</p>",source:"Build Fast with AI",url:"https://www.buildfastwithai.com/blogs/ai-news-today-june-22-2026",published:"2026-06-22",foryou:"리더십에 AI 도구 현황을 보고할 때, '공급 안정성 리스크'와 '대체 옵션' 항목을 함께 정리해 보세요."},articles:[{tag:"규제",source:"Build Fast with AI",url:"https://www.buildfastwithai.com/blogs/ai-news-today-june-22-2026",published:"2026-06-22",title:"미국 42개 주 AG, OpenAI 대규모 조사 — IPO 앞두고 불확실성 확대",summary:"42개 주 법무장관이 OpenAI의 광고 과대 표시, sycophancy 문제, 데이터 처리 등을 조사합니다. 9월 IPO를 앞둔 조사로, OpenAI 의존도가 높은 조직은 공급자 리스크를 재점검해야 합니다.",detail:"<p><b>Sycophancy란</b>: AI가 사실보다 사용자가 듣고 싶은 말을 하는 경향입니다. 의사결정 지원 용도로 AI를 쓴다면 특히 중요합니다.</p><p>42개 주 동시 조사는 일반적인 규제와 다른 차원입니다. OpenAI 기반 도구를 핵심 업무에 쓰는 팀이 있다면 대체 옵션 검토를 백로그에 올려두세요.</p>",foryou:"의사결정 지원에 AI를 활용한다면 '원하는 답'이 아닌 '맞는 답'을 받는지 주기적으로 교차 검증하는 프로세스를 팀 내에 만들어보세요."},{tag:"산업 동향",source:"Unrot",url:"https://unrot.co/blogs/ai-news-today-june-20-2026",published:"2026-06-20",title:"DXC·TCS, 같은 날 Claude 글로벌 파트너십 체결 — SI 채널로 엔터프라이즈 확산",summary:"세계 최대 IT 서비스 기업 DXC테크놀로지·TCS가 하루 간격으로 Claude 글로벌 파트너십을 체결했습니다. 앤트로픽이 SI 파트너 채널 중심으로 전환하는 신호입니다.",detail:"<p>TCS는 60만 명 이상의 임직원과 전 세계 대기업 클라이언트를 보유합니다. 이 채널을 통해 Claude가 엔터프라이즈 표준 AI로 빠르게 확산될 가능성이 높습니다.</p>",foryou:"AI 도입 계획이 있다면, 기존 IT 서비스 파트너(DXC, TCS, Accenture 등)가 Claude 파트너인지 확인해보세요."}]}]};

const panelEl=document.getElementById("panel");
const det=d=>d?`<button class="nl-more-btn" type="button" aria-expanded="false"><span class="nl-more-btn__t">자세히 보기</span><span class="nl-more-btn__chev">▾</span></button><div class="nl-detail">${d}</div>`:"";
const card=a=>`<article class="nl-card"><div class="nl-card__meta"><span class="nl-tag">${esc(a.tag)}</span><span class="nl-card__dot"></span>${a.url?`<a class="nl-src" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.source)} ↗</a>`:`<span>${esc(a.source)}</span>`}${a.published?`<span class="nl-card__dot"></span><span>🗓 ${esc(a.published)}</span>`:""}</div><h4 class="nl-card__title">${esc(a.title)}</h4><p class="nl-card__summary">${esc(a.summary)}</p>${det(a.detail)}<div class="nl-foryou"><span class="nl-foryou__label">✨ TPM 관점</span><span class="nl-foryou__text">${a.foryou}</span></div></article>`;
function render(i){
  const t=topics[i];
  panelEl.className="nl-panel nl-tint-"+t.tint;
  panelEl.setAttribute("aria-labelledby","tab-"+t.id);
  panelEl.innerHTML=`<div class="nl-panel__head"><span class="nl-panel__icon">${esc(t.icon)}</span><h3 class="nl-panel__title">${esc(t.label)}</h3></div><p class="nl-panel__desc">${esc(t.desc)}</p>${t.criteria?`<details class="nl-criteria"><summary>ⓘ 이 소식들은 이렇게 골랐어요</summary><div class="nl-criteria__body">${t.criteria}</div></details>`:""}<section class="nl-hl"><span class="nl-hl__kicker">⭐ ${esc(t.highlight.kicker)}</span><h2 class="nl-hl__title">${esc(t.highlight.title)}</h2><p class="nl-hl__summary">${esc(t.highlight.summary)}</p>${det(t.highlight.detail)}${t.highlight.url?`<div class="nl-hl__src">🔗 출처: <a href="${esc(t.highlight.url)}" target="_blank" rel="noopener">${esc(t.highlight.source||"원문 보기")} ↗</a>${t.highlight.published?` · 🗓 ${esc(t.highlight.published)}`:""}</div>`:""}<div class="nl-foryou nl-foryou--lg"><span class="nl-foryou__label">✨ TPM 관점</span><span class="nl-foryou__text">${t.highlight.foryou}</span></div></section><div class="nl-more__label">더 읽을거리</div><div class="nl-grid">${t.articles.map(card).join("")}</div>`;
}
tabsEl.addEventListener("click",e=>{const b=e.target.closest(".nl-tab");if(!b)return;const i=+b.dataset.i;tabsEl.querySelectorAll(".nl-tab").forEach(x=>x.setAttribute("aria-selected",String(+x.dataset.i===i)));render(i)});
render(0);
panelEl.addEventListener("click",e=>{const b=e.target.closest(".nl-more-btn");if(!b)return;const open=b.getAttribute("aria-expanded")==="true";b.setAttribute("aria-expanded",String(!open));const d=b.nextElementSibling;if(d&&d.classList.contains("nl-detail"))d.classList.toggle("open",!open);const t=b.querySelector(".nl-more-btn__t");if(t)t.textContent=open?"자세히 보기":"접기"});
document.getElementById("footer").innerHTML=`<footer class="nl-footer"><div class="nl-footer__brand"><div class="nl-footer__logo">AI</div><div><div class="nl-footer__name">주간 AI 뉴스레터 — TPM Edition</div><div class="nl-footer__sub">Claude (Cowork) 큐레이션 · 매주 월요일 오후 1시 자동 발행</div></div></div><p class="nl-footer__disc">※ 2026년 6월 16~23일 공개 뉴스 기반. 개별 사실은 원문 링크를 확인하세요.</p></footer>`;
})();
(function(){
const body=document.body,btn=document.getElementById("themeBtn");
const mq=window.matchMedia?window.matchMedia("(prefers-color-scheme: dark)"):null;
function saved(){try{return localStorage.getItem("nl-theme")}catch(e){return null}}
function dark(){const s=saved();return s==="dark"?true:s==="light"?false:(mq?mq.matches:false)}
function apply(){body.classList.toggle("fl-dark",dark())}
btn.addEventListener("click",()=>{const n=dark()?"light":"dark";try{localStorage.setItem("nl-theme",n)}catch(e){}document.documentElement.dataset.nlTheme=n;apply()});
if(mq)mq.addEventListener("change",()=>{if(!saved())apply()});
apply();
})();
</script>
</body>
</html>
