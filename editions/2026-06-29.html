// ── Render ──
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTopic(topic) {
  const t = topic.tint;
  const h = topic.highlight;

  const articlesHtml = topic.articles.map((a, i) => `
    <div class="article-card">
      <span class="article-tag">${escapeHtml(a.tag)}</span>
      <div class="article-title"><a href="${escapeHtml(a.url)}" target="_blank" rel="noopener">${escapeHtml(a.title)}</a></div>
      <div class="article-summary">${escapeHtml(a.summary)}</div>
      <div class="article-detail-area" id="ad-${topic.id}-${i}">${escapeHtml(a.detail)}<div class="foryou-badge">💡 TPM 관점 &nbsp; ${escapeHtml(a.foryou)}</div></div>
      <div class="article-footer">
        <span class="card-meta">${escapeHtml(a.source)} · ${escapeHtml(a.published)}</span>
        <button class="btn-detail" onclick="toggleDetail('ad-${topic.id}-${i}', this)">자세히 보기 ▾</button>
      </div>
    </div>
  `).join('');

  return `
    <div class="tint-${t}">
      <div class="tab-desc">${escapeHtml(topic.desc)}</div>
      <div class="highlight-kicker">${escapeHtml(h.kicker)}</div>
      <div class="highlight-card">
        <div class="highlight-title"><a href="${escapeHtml(h.url)}" target="_blank" rel="noopener">${escapeHtml(h.title)}</a></div>
        <div class="highlight-summary">${escapeHtml(h.summary)}</div>
        <div class="detail-area" id="hd-${topic.id}">${escapeHtml(h.detail)}<div class="foryou-badge">💡 TPM 관점 &nbsp; ${escapeHtml(h.foryou)}</div></div>
        <div class="card-footer">
          <span class="card-meta">${escapeHtml(h.source)} · ${escapeHtml(h.published)}</span>
          <button class="btn-detail" onclick="toggleDetail('hd-${topic.id}', this)">자세히 보기 ▾</button>
        </div>
      </div>
      <div class="section-label">추가 기사</div>
      <div class="article-list">${articlesHtml}</div>
    </div>
  `;
}

function toggleDetail(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.classList.toggle('open');
  btn.textContent = open ? '접기 ▴' : '자세히 보기 ▾';
}

function buildTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = NEWSLETTER.topics.map((t, i) =>
    `<button class="tab-btn${i===0?' active':''}" data-tint="${t.tint}" data-idx="${i}" onclick="switchTab(${i})">${t.icon} ${t.label}</button>`
  ).join('');
}

function switchTab(idx) {
  const topic = NEWSLETTER.topics[idx];
  document.getElementById('contentArea').innerHTML = renderTopic(topic);
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i===idx));
}

buildTabs();
switchTab(0);

// ── Dark mode ──
const toggle = document.getElementById('themeToggle');
let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
function applyTheme() {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  toggle.textContent = dark ? '☀️ 라이트' : '🌙 다크';
}
applyTheme();
toggle.addEventListener('click', () => { dark = !dark; applyTheme(); });
</script>
